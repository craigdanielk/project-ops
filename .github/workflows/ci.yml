name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts syntax
        run: |
          find . -name "*.sh" -type f | while read f; do
            bash -n "$f" && echo "OK: $f" || echo "FAIL: $f"
          done

      - name: Validate JSON files
        run: |
          find . -name "*.json" -type f | while read f; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f" || echo "FAIL: $f"
          done
